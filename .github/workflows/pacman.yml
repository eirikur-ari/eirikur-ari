name: generate arcade contribution graphs

on:
    schedule: # Run automatically every 24 hours
        - cron: '0 0 * * *'
    workflow_dispatch: # Allows manual triggering
    push: # Runs on every push to the master branch
        branches:
            - master

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: generate contribution graph SVGs
              uses: abozanona/pacman-contribution-graph@d258e3fb01511c1ff4fe6418408ede37b2ad4935 #v5.0.0
              with:
                  github_user_name: ${{ github.repository_owner }}
                  # Comma-separated list of game names to generate. Default: pacman
                  games: 'pacman,breakout'

            # Push the generated SVGs to the output branch
            - name: push SVGs to the output branch
              uses: crazy-max/ghaction-github-pages@c0d7ff0487ee0415efb7f32dab10ea880330b1dd #v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}